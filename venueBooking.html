    <h2>Book a venue</h2>
    <p>Fill in the form below and we will contact you soon!</p>
    <form id="booking" name="bookingForm" onsubmit="event.preventDefault()">
        <div>
            <input type="text" id="name" name="customerName" placeholder="Name">
        </div>
        <div>
            <input type="text" id="email" name="email" placeholder="Email">
        </div>
        <div>
            <input type="date" id="date" name="date">
        </div>
        <div>
            <textarea rows="6" id="details" name="details" placeholder="Details"></textarea>
        </div>
        <div>
            <input type="submit" value="Send" id="submit">
        </div>
    </form>
